<style>
    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #eef1f7;
        color: #222;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
        overflow-x: hidden;
    }

    /* ✈️ Airplane Animation */
    .plane {
        position: fixed;
        top: 20px;
        left: -200px;
        width: 120px;
        opacity: 0.9;
        animation: fly 12s linear infinite;
        pointer-events: none;
    }

    @keyframes fly {
        0% { transform: translateX(-200px); }
        100% { transform: translateX(120vw); }
    }

    .container {
        width: 100%;
        max-width: 850px;
        background: #fff;
        padding: 35px;
        border-radius: 18px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        animation: fadeIn .5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        text-align: center;
        font-size: 34px;
        margin-bottom: 8px;
        color: #2d4bff;
        font-weight: 800;
    }

    .subtitle {
        text-align: center;
        margin-bottom: 30px;
        color: #555;
        font-size: 15px;
    }

    textarea {
        width: 100%;
        height: 130px;
        padding: 15px;
        border-radius: 12px;
        border: 2px solid #dce1f0;
        font-size: 16px;
        resize: none;
        outline: none;
        transition: .2s;
        background: #fafbff;
    }

    textarea:focus {
        border-color: #2d4bff;
        box-shadow: 0 0 0 3px rgba(45,75,255,0.15);
    }

    .row {
        display: flex;
        gap: 15px;
        margin: 20px 0;
        flex-wrap: wrap;
    }

    select {
        flex: 1;
        min-width: 150px;
        padding: 12px;
        border-radius: 10px;
        border: 2px solid #dce1f0;
        font-size: 16px;
        outline: none;
        background: #fafbff;
        transition: .2s;
    }

    select:focus {
        border-color: #2d4bff;
        box-shadow: 0 0 0 3px rgba(45,75,255,0.15);
    }

    button {
        width: 100%;
        padding: 15px;
        background: #2d4bff;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        cursor: pointer;
        transition: .2s;
        font-weight: 600;
    }

    button:hover {
        background: #1f36c9;
    }

    #output {
        margin-top: 20px;
        padding: 20px;
        background: #f0f2ff;
        border-radius: 12px;
        min-height: 90px;
        white-space: pre-wrap;
        font-size: 17px;
        border: 2px solid #dce1f0;
    }

    #copy-btn {
        margin-top: 12px;
        padding: 10px 20px;
        background: #111;
        color: #fff;
        border-radius: 8px;
        cursor: pointer;
        display: none;
    }
</style>
</head>
<body>

<!-- ✈️ Flying Plane -->


<div class="container">
    <h1>On‑The‑Fly Translator</h1>
    <div class="subtitle">Fast • Free • Browser‑Only</div>

    <textarea id="input" placeholder="Type text to translate..."></textarea>

    <div class="row">
        <select id="src"></select>
        <select id="target"></select>
    </div>

    <button onclick="safeTranslate()">Translate</button>

    <div id="output">Your translation will appear here...</div>
    <button id="copy-btn" onclick="copyText()">Copy</button>
</div>

<script>
/* Disable right-click */
document.addEventListener("contextmenu", e => e.preventDefault());

/* Block inspect shortcuts */
document.onkeydown = e => {
    if (e.key === "F12") return false;
    if (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) return false;
    if (e.ctrlKey && e.key === "U") return false;
};

/* Random Email */
function randomEmail() {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    const rand = Array.from({ length: 12 }, () =>
        chars[Math.floor(Math.random() * chars.length)]
    ).join("");
    return `${rand}@auto-user.net`;
}

/* Safety Filter */
function safetyScrub(text) {
    return text;
}

/* Copy Output */
function copyText() {
    navigator.clipboard.writeText(document.getElementById("output").innerText);
}

/* Languages */
const languages = {
    en: "English", es: "Spanish", fr: "French", de: "German",
    it: "Italian", pt: "Portuguese", ja: "Japanese", ko: "Korean",
    hi: "Hindi", zh: "Chinese (Simplified)", ar: "Arabic",
    ru: "Russian", nl: "Dutch", sv: "Swedish", no: "Norwegian",
    fi: "Finnish", tr: "Turkish", pl: "Polish", cs: "Czech",
    el: "Greek", he: "Hebrew", th: "Thai", vi: "Vietnamese",
    id: "Indonesian"
};

/* Populate Menus */
function populateLanguageMenus() {
    const src = document.getElementById("src");
    const target = document.getElementById("target");

    for (const [code, name] of Object.entries(languages)) {
        src.innerHTML += `<option value="${code}">${name}</option>`;
        target.innerHTML += `<option value="${code}">${name}</option>`;
    }

    src.value = localStorage.getItem("srcLang") || "en";
    target.value = localStorage.getItem("targetLang") || "es";

    src.onchange = () => localStorage.setItem("srcLang", src.value);
    target.onchange = () => localStorage.setItem("targetLang", target.value);
}

/* Translate */
async function safeTranslate() {
    const text = document.getElementById('input').value;
    const src = document.getElementById('src').value;
    const target = document.getElementById('target').value;
    const outDiv = document.getElementById('output');
    const copyBtn = document.getElementById('copy-btn');

    if (!text.trim()) return;

    outDiv.innerText = "Translating...";
    copyBtn.style.display = "none";

    try {
        const email = randomEmail();

        const url =
            `https://api.mymemory.translated.net/get` +
            `?q=${encodeURIComponent(text)}` +
            `&langpair=${src}|${target}` +
            `&de=${email}`;

        const res = await fetch(url);
        const data = await res.json();

        let translated = data.responseData.translatedText;
        translated = safetyScrub(translated);

        outDiv.innerText = translated;

        if (translated.trim()) {
            copyBtn.style.display = "inline-block";
        }
    } catch (e) {
        outDiv.innerText = "Error: Service busy. Try again.";
        copyBtn.style.display = "none";
    }
}

/* Init */
window.onload = populateLanguageMenus;
</script>


</body>
</html>
